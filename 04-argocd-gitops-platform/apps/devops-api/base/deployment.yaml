apiVersion: apps/v1
kind: Deployment
metadata: {name: devops-api}
spec:
 replicas: 2
 strategy: {type: RollingUpdate, rollingUpdate: {maxUnavailable: 0, maxSurge: 1}}
 selector: {matchLabels: {app: devops-api}}
 template:
  metadata: {labels: {app: devops-api}}
  spec:
   automountServiceAccountToken: false
   securityContext: {runAsNonRoot: true, runAsUser: 1000, seccompProfile: {type: RuntimeDefault}}
   containers:
    - name: api
      image: devops-api:local
      imagePullPolicy: IfNotPresent
      ports: [{name: http, containerPort: 8080}]
      env: [{name: ENVIRONMENT, value: base}, {name: APP_VERSION, value: 1.0.0}]
      resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 500m, memory: 256Mi}}
      securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
      readinessProbe: {httpGet: {path: /readyz, port: http}, initialDelaySeconds: 5}
      livenessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 10}
      volumeMounts: [{name: tmp, mountPath: /tmp}]
   volumes: [{name: tmp, emptyDir: {}}]
