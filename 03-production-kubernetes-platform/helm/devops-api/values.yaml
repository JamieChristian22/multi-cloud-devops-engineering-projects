replicaCount: 2
image: {repository: devops-api, tag: local, pullPolicy: IfNotPresent}
service: {type: ClusterIP, port: 80, targetPort: 8080}
resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 500m, memory: 256Mi}}
autoscaling: {enabled: true, minReplicas: 2, maxReplicas: 6, targetCPUUtilizationPercentage: 70}
podDisruptionBudget: {enabled: true, minAvailable: 1}
networkPolicy: {enabled: true}
serviceMonitor: {enabled: false}
prometheusRule: {enabled: false}
env: {ENVIRONMENT: kubernetes, APP_VERSION: 1.0.0}
