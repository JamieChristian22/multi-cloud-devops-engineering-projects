apiVersion: v1
kind: Service
metadata:
 name: {{ include "devops-api.fullname" . }}
 labels:
  {{- include "devops-api.selector" . | nindent 2 }}
spec:
 selector:
  {{- include "devops-api.selector" . | nindent 2 }}
 ports: [{name: http, port: {{ .Values.service.port }}, targetPort: {{ .Values.service.targetPort }}}]
