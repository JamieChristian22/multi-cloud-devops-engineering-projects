{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: {name: {{ include "devops-api.fullname" . }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: {{ include "devops-api.name" . }}}}
  endpoints: [{port: http, path: /metrics, interval: 30s}]
{{- end }}
